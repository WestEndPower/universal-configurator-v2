<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Customer Quote</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#eee;color:#111;font-family:Arial,Helvetica,sans-serif}.toolbar{position:sticky;top:0;background:#222;color:#fff;padding:10px 16px;display:flex;justify-content:flex-end;gap:8px}.toolbar button{padding:9px 13px;border:0;border-radius:6px;font-weight:700;cursor:pointer}.page{width:min(900px,calc(100% - 24px));margin:18px auto;background:#fff;padding:34px;box-shadow:0 2px 12px #0002}.header{display:flex;justify-content:space-between;gap:20px;border-bottom:3px solid #222;padding-bottom:18px}.dealer h1{margin:0 0 7px;font-size:25px}.muted{color:#666}.quote-meta{text-align:right}.quote-meta h2{margin:0 0 8px}.customer{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin:22px 0}.box{border:1px solid #ccc;border-radius:8px;padding:13px}.box h3{margin:0 0 8px;font-size:14px;text-transform:uppercase;color:#555}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:10px 8px;border-bottom:1px solid #ddd;text-align:left;vertical-align:top}th{background:#f3f3f3;font-size:11px;text-transform:uppercase}.num{text-align:right;white-space:nowrap}.component{display:block;margin-top:5px;color:#555;font-size:12px}.totals{width:min(420px,100%);margin:20px 0 0 auto}.total-row{display:flex;justify-content:space-between;padding:7px 0}.grand{border-top:2px solid #222;margin-top:6px;padding-top:11px;font-size:18px;font-weight:800}.notes{margin-top:24px;white-space:pre-wrap}.empty{padding:40px;text-align:center;color:#a00;font-weight:700}@media print{body{background:#fff}.toolbar{display:none}.page{width:100%;margin:0;padding:20px;box-shadow:none}@page{margin:.45in}}
</style></head><body>
<div class="toolbar"><button onclick="window.print()">Print / Save PDF</button><button onclick="window.close()">Close</button></div><main class="page" id="quote-page"></main>
<script>
'use strict';
const esc=v=>String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
const data=(()=>{try{const key='universal-cpq-current-quote';const raw=localStorage.getItem(key);if(!raw)return null;return JSON.parse(raw)}catch(error){console.error('Unable to read quote data.',error);return null}})();
const locale=data?.application?.locale||'en-US', currency=data?.application?.currency||'USD';
const money=v=>new Intl.NumberFormat(locale,{style:'currency',currency}).format(Number(v)||0);
const date=v=>{if(!v)return '';const d=new Date(v);return Number.isNaN(d.getTime())?'':d.toLocaleDateString(locale)};
const dealerLine=[data?.dealer?.address,[data?.dealer?.city,data?.dealer?.state,data?.dealer?.zip].filter(Boolean).join(', ')].filter(Boolean).join('<br>');
const customerAddress=[data?.customer?.address,[data?.customer?.city,data?.customer?.state,data?.customer?.zip].filter(Boolean).join(', ')].filter(Boolean).join('<br>');
const page=document.getElementById('quote-page');
if(!data){page.innerHTML='<div class="empty">No quote data was found. Return to the configurator and choose Preview / Print Quote.</div>';}else{
const rows=(data.items||[]).map(item=>`<tr><td class="num">${esc(item.quantity)}</td><td><strong>${esc(item.name)}</strong><br><span class="muted">${esc(item.model)}${item.sku?' • '+esc(item.sku):''}</span>${(item.components||[]).map(c=>`<span class="component">${esc(c.type)}: ${esc(c.name)}${c.sku?' • '+esc(c.sku):''} ×${esc(c.quantity)}</span>`).join('')}</td><td class="num">${money(item.unitPrice)}</td><td class="num">${money(item.componentTotal)}</td><td class="num"><strong>${money(item.lineTotal)}</strong></td></tr>`).join('');
page.innerHTML=`<header class="header"><div class="dealer"><h1>${esc(data.dealer?.name||data.application?.name||'Dealer')}</h1><div>${dealerLine}</div><div>${esc(data.dealer?.phone||'')} ${data.dealer?.email?'• '+esc(data.dealer.email):''}</div></div><div class="quote-meta"><h2>Customer Quote</h2><div><strong>${esc(data.quoteNumber)}</strong></div><div>Date: ${date(data.createdAt)}</div>${data.validThrough?`<div>Valid Through: ${date(data.validThrough)}</div>`:''}<div>Status: ${esc(data.status)}</div></div></header>
<section class="customer"><div class="box"><h3>Prepared For</h3><strong>${esc(data.customer?.name||'Not Provided')}</strong>${data.customer?.business?`<div>${esc(data.customer.business)}</div>`:''}<div>${customerAddress}</div><div>${esc(data.customer?.phone||'')}</div><div>${esc(data.customer?.email||'')}</div></div><div class="box"><h3>Prepared By</h3><strong>${esc(data.preparedBy||'Not Selected')}</strong><div>${esc(data.brand?.name||'')}</div></div></section>
<table><thead><tr><th class="num">Qty</th><th>Description</th><th class="num">Unit Price</th><th class="num">Components</th><th class="num">Line Total</th></tr></thead><tbody>${rows}</tbody></table>
<div class="totals"><div class="total-row"><span>Equipment & Components</span><strong>${money(data.totals?.subtotal)}</strong></div>${Number(data.totals?.promotions)?`<div class="total-row"><span>Promotions</span><strong>-${money(data.totals.promotions)}</strong></div>`:''}<div class="total-row"><span>Freight</span><strong>${money(data.totals?.freight)}</strong></div><div class="total-row"><span>Sales Tax</span><strong>${money(data.totals?.tax)}</strong></div><div class="total-row grand"><span>Total</span><span>${money(data.totals?.total)}</span></div></div>
${data.finance?.selected?`<section class="box" style="margin-top:24px"><h3>Selected Financing</h3><strong>${esc(data.finance.selected.label)}</strong><div>${Number(data.finance.selected.apr).toFixed(2)}% APR for ${esc(data.finance.selected.termMonths)} months</div><div>Estimated payment: ${money(data.finance.selected.estimatedMonthlyPayment)}/month</div></section>`:''}
${data.customer?.notes?`<section class="notes"><strong>Notes</strong><br>${esc(data.customer.notes)}</section>`:''}${data.terms?`<section class="notes"><strong>Terms</strong><br>${esc(data.terms)}</section>`:''}`;
}
</script></body></html>
